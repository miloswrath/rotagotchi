<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rotagotchi</title>
    <style>
      :root {
        --screen-size: 256px;
        --pad: 16px;
        --popup-w: calc(var(--screen-size) + var(--pad) * 2);
        --bg:        #080a0c;
        --bezel:     #101418;
        --screen-bg: #050708;
        --rim:       #1a1f24;
        --glow:      #22c55e;
        --glow-dim:  #16a34a;
        --text-dim:  #3a4a3a;
        --text-muted:#5a7a5a;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: var(--popup-w);
        background: var(--bg);
        overflow: hidden;
        font-family: ui-monospace, 'Cascadia Code', Consolas, 'Courier New', monospace;
      }

      /* ── Screen visibility ── */
      .screen-hidden { display: none !important; }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px var(--pad) 8px;
        border-bottom: 1px solid var(--rim);
        background: var(--bezel);
      }

      .wordmark {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--glow);
        text-shadow: 0 0 8px color-mix(in srgb, var(--glow) 50%, transparent);
      }

      .indicators {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* Three tiny orbs — tamagotchi button aesthetic */
      .orb {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--text-dim);
      }
      .orb.live {
        background: var(--glow);
        box-shadow: 0 0 5px var(--glow-dim);
        animation: breathe 2.8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% { opacity: 1;   box-shadow: 0 0 6px var(--glow-dim); }
        50%       { opacity: 0.4; box-shadow: 0 0 2px transparent;     }
      }

      /* ── Screen frame ── */
      .screen-wrap {
        padding: var(--pad);
        background: var(--bezel);
        position: relative;
      }

      /* Outer rim — inset shadow gives a recessed look */
      .screen-rim {
        border-radius: 6px;
        padding: 3px;
        background: linear-gradient(145deg, #0d1012, #1c2126);
        box-shadow:
          inset 0 2px 4px rgba(0,0,0,0.8),
          inset 0 -1px 2px rgba(255,255,255,0.03),
          0 1px 0 rgba(255,255,255,0.04);
      }

      /* The actual "glass" panel */
      .screen-glass {
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        background: var(--screen-bg);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
      }

      /* Scanline overlay — CSS-only CRT effect */
      .screen-glass::after {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 1px,
          rgba(0, 0, 0, 0.18) 1px,
          rgba(0, 0, 0, 0.18) 2px
        );
        pointer-events: none;
        z-index: 10;
        border-radius: 4px;
      }

      /* Subtle green phosphor tint at top */
      .screen-glass::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 40%;
        background: linear-gradient(
          to bottom,
          rgba(34, 197, 94, 0.03),
          transparent
        );
        pointer-events: none;
        z-index: 9;
      }

      #pet-container {
        display: block;
        width: var(--screen-size);
        height: var(--screen-size);
        position: relative;
        z-index: 1;
      }

      /* ── Login screen overlay (T010) ── */
      #screen-login {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--screen-bg);
        gap: 14px;
        padding: var(--pad);
      }

      .login-title {
        font-size: 9px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.6;
      }

      #btn-signin {
        font-family: inherit;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--glow);
        background: transparent;
        border: 1px solid var(--glow-dim);
        border-radius: 3px;
        padding: 8px 16px;
        cursor: pointer;
        text-shadow: 0 0 8px color-mix(in srgb, var(--glow) 40%, transparent);
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #btn-signin:hover {
        border-color: var(--glow);
        box-shadow: 0 0 10px color-mix(in srgb, var(--glow) 25%, transparent);
      }
      #btn-signin:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #login-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      #error-msg {
        font-size: 8px;
        color: #f87171;
        text-align: center;
        letter-spacing: 0.1em;
        line-height: 1.5;
        max-width: 200px;
      }

      #btn-retry {
        font-family: inherit;
        font-size: 8px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: transparent;
        border: 1px solid var(--rim);
        border-radius: 3px;
        padding: 5px 10px;
        cursor: pointer;
      }
      #btn-retry:hover { border-color: var(--text-muted); }

      /* ── Footer ── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px var(--pad) 8px;
        border-top: 1px solid var(--rim);
        background: var(--bezel);
        min-height: 32px;
      }

      .status-label {
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      /* Tiny blinking cursor — "alive" feel */
      .cursor {
        display: inline-block;
        width: 5px;
        height: 9px;
        background: var(--glow);
        vertical-align: middle;
        margin-left: 4px;
        opacity: 0;
        animation: blink 1.1s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 0; }
        50%       { opacity: 0.7; }
      }

      /* ── Connection badge (T016 + T017) ── */
      #connection-badge {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .badge-connected,
      .badge-disconnected {
        font-size: 8px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .badge-connected {
        color: var(--glow);
        text-shadow: 0 0 6px color-mix(in srgb, var(--glow) 40%, transparent);
      }

      .badge-disconnected {
        color: #d97706;
        cursor: pointer;
      }
      .badge-disconnected:hover { text-decoration: underline; }

      /* ── Sign-out button ── */
      #btn-signout {
        font-family: inherit;
        font-size: 8px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 2px 4px;
      }
      #btn-signout:hover { color: var(--text-muted); }

      .build-tag {
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="wordmark">Rotagotchi</span>
      <div class="indicators">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb live" title="active"></div>
      </div>
    </div>

    <div class="screen-wrap">
      <div class="screen-rim">
        <div class="screen-glass">
          <!-- Tamagotchi animation — shown on intro and main screens -->
          <div id="pet-container"></div>

          <!-- Login screen overlay (T010) — hidden until no session detected -->
          <section id="screen-login" class="screen-hidden">
            <p class="login-title">connect your<br>github account</p>
            <button id="btn-signin">Sign in with GitHub</button>
            <div id="login-error" class="screen-hidden">
              <p id="error-msg"></p>
              <button id="btn-retry">Try again</button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div class="footer">
      <!-- Intro screen: "watching" label (T011) -->
      <span class="status-label" id="status-label">watching<span class="cursor"></span></span>

      <!-- Main screen: connection badge (T016) -->
      <div id="connection-badge" class="screen-hidden">
        <span class="badge-connected screen-hidden">&#9679; Connected</span>
        <span class="badge-disconnected screen-hidden">&#9679; Disconnected</span>
      </div>

      <!-- Main screen: sign-out button (T021) -->
      <button id="btn-signout" class="screen-hidden">Sign out</button>

      <span class="build-tag">v0.1</span>
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
