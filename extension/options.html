<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotagotchi — Blocked Sites</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        max-width: 480px;
        font-family: Arial, Helvetica, sans-serif;
        background: #111;
        color: #ddd;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 16px;
      }

      #domain-list {
        list-style: none;
        margin: 0 0 16px;
        padding: 0;
      }

      #domain-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        border-radius: 4px;
        background: #1e1e1e;
        margin-bottom: 6px;
        font-size: 14px;
      }

      button.remove {
        background: none;
        border: 1px solid #555;
        color: #bbb;
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 12px;
      }

      button.remove:hover {
        background: #333;
      }

      .add-row {
        display: flex;
        gap: 8px;
      }

      #new-domain {
        flex: 1;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #444;
        background: #1e1e1e;
        color: #ddd;
        font-size: 14px;
      }

      button#add-btn {
        padding: 6px 16px;
        border-radius: 4px;
        border: none;
        background: #2e7d32;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }

      button#add-btn:hover {
        background: #388e3c;
      }

      #error-msg {
        color: #ef5350;
        font-size: 13px;
        margin-top: 8px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h1>Manage Blocked Sites</h1>
    <ul id="domain-list"></ul>
    <div class="add-row">
      <input
        id="new-domain"
        type="text"
        placeholder="e.g. reddit.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="add-btn">Add</button>
    </div>
    <p id="error-msg"></p>
    <script src="dist/options.js"></script>
  </body>
</html>
